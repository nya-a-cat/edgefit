name: EdgeFit
description: Run EdgeFit deployment-budget verification in CI on Linux bash runners.

inputs:
  model:
    description: Path to an ONNX model or normalized EdgeFit model JSON file.
    required: true
  target:
    description: Path to the target profile.
    required: true
  report:
    description: Path for the SARIF report.
    required: false
    default: edgefit.sarif
  summary:
    description: Path for the Markdown job summary.
    required: false
    default: edgefit-summary.md
  suppressions:
    description: Comma-separated diagnostic IDs accepted for this workflow.
    required: false
    default: ""
  install-onnx:
    description: Install the Python ONNX adapter dependency before running.
    required: false
    default: "true"

runs:
  using: composite
  steps:
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
    - name: Set up Python for ONNX input
      if: ${{ inputs.install-onnx == 'true' }}
      uses: actions/setup-python@v5
      with:
        python-version: "3.x"
    - name: Build EdgeFit
      shell: bash
      env:
        CARGO_TARGET_DIR: ${{ runner.temp }}/edgefit-target
      run: cargo build --manifest-path "$GITHUB_ACTION_PATH/Cargo.toml" -p edgefit-cli --release
    - name: Install ONNX adapter dependency
      if: ${{ inputs.install-onnx == 'true' }}
      shell: bash
      run: python -m pip install -r "$GITHUB_ACTION_PATH/tools/onnx-normalize/requirements.txt"
    - name: Validate target
      shell: bash
      env:
        CARGO_TARGET_DIR: ${{ runner.temp }}/edgefit-target
        EDGEFIT_TARGET: ${{ inputs.target }}
      run: "$CARGO_TARGET_DIR/release/edgefit" target validate "$EDGEFIT_TARGET"
    - name: Run EdgeFit
      id: edgefit
      shell: bash
      env:
        CARGO_TARGET_DIR: ${{ runner.temp }}/edgefit-target
        EDGEFIT_MODEL: ${{ inputs.model }}
        EDGEFIT_TARGET: ${{ inputs.target }}
        EDGEFIT_REPORT: ${{ inputs.report }}
        EDGEFIT_SUMMARY: ${{ inputs.summary }}
        EDGEFIT_SUPPRESSIONS: ${{ inputs.suppressions }}
      run: |
        set +e
        edgefit_args=(check "$EDGEFIT_MODEL" --target "$EDGEFIT_TARGET" --format sarif --out "$EDGEFIT_REPORT" --summary "$EDGEFIT_SUMMARY")
        if [ -n "$EDGEFIT_SUPPRESSIONS" ]; then
          edgefit_args+=(--suppress "$EDGEFIT_SUPPRESSIONS")
        fi
        "$CARGO_TARGET_DIR/release/edgefit" "${edgefit_args[@]}"
        edgefit_exit=$?
        printf 'exit_code=%s\n' "$edgefit_exit" >> "$GITHUB_OUTPUT"
        exit 0
    - name: Publish job summary
      if: ${{ always() }}
      shell: bash
      env:
        EDGEFIT_SUMMARY: ${{ inputs.summary }}
      run: |
        if [ -n "${GITHUB_STEP_SUMMARY:-}" ] && [ -f "$EDGEFIT_SUMMARY" ]; then
          cat "$EDGEFIT_SUMMARY" >> "$GITHUB_STEP_SUMMARY"
        fi
    - name: Enforce EdgeFit result
      if: ${{ always() }}
      shell: bash
      env:
        EDGEFIT_EXIT_CODE: ${{ steps.edgefit.outputs.exit_code }}
      run: exit "${EDGEFIT_EXIT_CODE:-2}"
