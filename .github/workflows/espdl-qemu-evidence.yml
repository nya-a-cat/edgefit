name: ESP-DL QEMU evidence

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  esp32s3-qemu:
    name: ESP32-S3 simulated deployment
    runs-on: ubuntu-latest
    timeout-minutes: 30
    container:
      image: espressif/idf:v5.5.4
      options: --user root
    steps:
      - uses: actions/checkout@v4
      - name: Install official QEMU runtime
        shell: bash
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            ca-certificates curl libgcrypt20 libglib2.0-0 libpixman-1-0 libsdl2-2.0-0 libslirp0
          qemu_url="https://github.com/espressif/qemu/releases/download/esp-develop-9.2.2-20260417/qemu-xtensa-softmmu-esp_develop_9.2.2_20260417-x86_64-linux-gnu.tar.xz"
          qemu_archive="/tmp/qemu-xtensa.tar.xz"
          qemu_dir="/opt/espressif-qemu"
          curl --fail --location --silent --show-error "$qemu_url" --output "$qemu_archive"
          echo "0eecb2a34a5586c0e59110f77b9343b7b336e82fdb0e1a30e1dc1bab8a547e35  $qemu_archive" | sha256sum --check
          mkdir -p "$qemu_dir"
          tar -xJf "$qemu_archive" -C "$qemu_dir" --strip-components=1
          echo "$qemu_dir/bin" >> "$GITHUB_PATH"
      - name: Build firmware and run simulated model-load smoke
        shell: bash
        run: |
          . "$IDF_PATH/export.sh"
          tools/espdl-qemu/run_evidence.sh
      - name: Publish simulation summary
        if: ${{ always() && hashFiles('tmp/espdl-qemu/evidence.md') != '' }}
        shell: bash
        run: cat tmp/espdl-qemu/evidence.md >> "$GITHUB_STEP_SUMMARY"
      - name: Upload simulation evidence
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: espdl-esp32s3-qemu-evidence
          path: |
            tmp/espdl-qemu/evidence.json
            tmp/espdl-qemu/evidence.md
            tmp/espdl-qemu/qemu.log
          if-no-files-found: warn
          retention-days: 14
