name: Alpha evidence

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  squeezenet-quantization-case:
    name: SqueezeNet FP32 vs INT8
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install Rust
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master snapshot
        with:
          toolchain: 1.97.0
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            tools/onnx-normalize/requirements.txt
            tools/onnx-normalize/requirements-runtime.txt
      - name: Install pinned ONNX Runtime dependencies
        run: python -m pip install -r tools/onnx-normalize/requirements-runtime.txt
      - name: Build EdgeFit
        run: cargo build --workspace --release --locked
      - name: Download and verify the two pinned real models
        run: |
          python tools/onnx-normalize/real_world_corpus.py \
            --download \
            --cache tmp/real_world_corpus \
            --model-id onnx-model-zoo-squeezenet1.0-12 \
            --model-id onnx-model-zoo-squeezenet1.0-12-int8 \
            --out tmp/alpha-case/corpus-verification.json
      - name: Locate and repair the missing INT8 value_info
        run: |
          python tools/onnx-normalize/real_world_corpus.py \
            --cache tmp/real_world_corpus \
            --model-id onnx-model-zoo-squeezenet1.0-12-int8 \
            --repair-qlinear-global-average-pool pool10_1_quantized \
            --repair-out tmp/real_world_corpus/squeezenet1.0-12-int8-value-info.onnx \
            --out tmp/alpha-case/value-info-repair.json
      - name: Verify repaired model runtime equivalence
        run: |
          python tools/onnx-normalize/runtime_smoke.py \
            --reference-model tmp/real_world_corpus/squeezenet1.0-12-int8.onnx \
            --candidate-model tmp/real_world_corpus/squeezenet1.0-12-int8-value-info.onnx \
            --provider CPUExecutionProvider \
            --out tmp/alpha-case/runtime-equivalence.json
      - name: Generate repeatable Alpha evidence
        run: |
          python tools/competitive-benchmark/benchmark.py \
            --manifest tools/competitive-benchmark/alpha_case_manifest.json \
            --corpus-cache tmp/real_world_corpus \
            --edgefit target/release/edgefit \
            --tools edgefit \
            --edgefit-repetitions 7 \
            --out-dir tmp/alpha-case
      - name: Verify fail-to-pass closure
        shell: bash
        run: |
          set +e
          target/release/edgefit check \
            tmp/real_world_corpus/squeezenet1.0-12-int8.onnx \
            --target targets/ort-mobile-cpu.yaml \
            --format json \
            --out tmp/alpha-case/original-int8-report.json \
            --summary tmp/alpha-case/original-int8-summary.md
          original_exit=$?
          set -e
          test "$original_exit" -eq 1
          target/release/edgefit check \
            tmp/real_world_corpus/squeezenet1.0-12-int8-value-info.onnx \
            --target targets/ort-mobile-cpu.yaml \
            --format json \
            --out tmp/alpha-case/repaired-int8-report.json \
            --summary tmp/alpha-case/repaired-int8-summary.md
      - name: Publish comparison in job summary
        run: |
          cat tmp/alpha-case/competitive-benchmark.md >> "$GITHUB_STEP_SUMMARY"
          cat tmp/alpha-case/original-int8-summary.md >> "$GITHUB_STEP_SUMMARY"
          cat tmp/alpha-case/repaired-int8-summary.md >> "$GITHUB_STEP_SUMMARY"
      - name: Upload Alpha evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: alpha-squeezenet-evidence
          path: tmp/alpha-case/
          if-no-files-found: error
