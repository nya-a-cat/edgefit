    com.microsoft:
      QLinearAdd:
        dtypes: [float32, int8, uint8, int32]
      QLinearGlobalAveragePool:
        dtypes: [float32, int8, uint8, int32]
        max_rank: 8
      QLinearConcat:
        dtypes: [float32, int8, uint8, int32]
        max_rank: 8
shape:
  max_rank: 8
  allow_unknown_dims: true
  symbols:
    N: { max: 32 }
    batch_size: { max: 32 }
    H: { max: 1024 }
    W: { max: 1024 }

quantization:
  required: false
  require_int8: false
  min_quantized_weight_fraction: 0.0
  min_operator_coverage: 0.0
